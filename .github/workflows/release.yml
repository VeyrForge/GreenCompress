name: release

# On a version tag (v*): build the `greencompress` CLI for every OS/arch and attach
# ready-to-run binaries to a GitHub Release.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-latest,    target: x86_64-unknown-linux-gnu,  os: linux,   arch: x86_64 }
          - { runner: ubuntu-24.04-arm, target: aarch64-unknown-linux-gnu, os: linux,   arch: arm64 }
          - { runner: macos-14,         target: aarch64-apple-darwin,      os: darwin,  arch: arm64 }
          - { runner: windows-latest,   target: x86_64-pc-windows-msvc,    os: windows, arch: x86_64 }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: Build greencompress
        shell: bash
        env:
          CARGO_TARGET_DIR: rust/target
        run: cargo build --release --manifest-path rust/Cargo.toml --target ${{ matrix.target }}
      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          ver="${GITHUB_REF_NAME#v}"
          ext=""
          [ "${{ matrix.os }}" = "windows" ] && ext=".exe"
          dist="greencompress_${ver}_${{ matrix.os }}_${{ matrix.arch }}"
          mkdir "$dist"
          bin="rust/target/${{ matrix.target }}/release/greencompress${ext}"
          if [ ! -f "$bin" ]; then
            bin=$(find rust/target -type f -name "greencompress${ext}" | head -1)
          fi
          if [ -z "$bin" ] || [ ! -f "$bin" ]; then
            echo "greencompress binary not found under rust/target"
            find rust/target -type f || true
            exit 1
          fi
          cp "$bin" "$dist"/
          cp README.md "$dist"/ 2>/dev/null || true
          if [ "${{ matrix.os }}" = "windows" ]; then
            7z a "${dist}.zip" "$dist" >/dev/null
          else
            tar -czf "${dist}.tar.gz" "$dist"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: greencompress-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            greencompress_*.tar.gz
            greencompress_*.zip
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Checksums
        run: cd dist && sha256sum greencompress_* > checksums.txt
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          body_path: RELEASE_NOTES.md
          files: |
            dist/greencompress_*.tar.gz
            dist/greencompress_*.zip
            dist/checksums.txt
